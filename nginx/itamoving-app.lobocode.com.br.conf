# Itamoving frontend – proxy para container na porta host 3121 (docker-compose.prod.yml)
# Padrão: stayflow-app / der-app (HTTPS + redirect HTTP → HTTPS)
# SSL: Let's Encrypt (certbot --nginx -d itamoving-app.lobocode.com.br)

server {
    server_name itamoving-app.lobocode.com.br;

    location / {
        proxy_pass http://127.0.0.1:3121;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/itamoving-app.lobocode.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/itamoving-app.lobocode.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = itamoving-app.lobocode.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name itamoving-app.lobocode.com.br;
    return 404; # managed by Certbot

}
